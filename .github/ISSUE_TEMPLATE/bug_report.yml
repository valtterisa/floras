name: Bug report
description: Report a bug in Nebula
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Redact API keys and personal data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node/pnpm versions, Convex cloud vs anonymous, whether Box/Autumn were configured
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant console or Convex logs (redact secrets)
    validations:
      required: false
